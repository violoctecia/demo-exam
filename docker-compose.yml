services:
    db:
        image: postgres:17
        environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: mydb
        ports:
            - '5434:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U user -d mydb -h localhost']
            interval: 5s
            timeout: 5s
            retries: 10
        volumes:
            - pgdata:/var/lib/postgresql/data
        restart: unless-stopped

    # ── Dev: горячая перезагрузка ─────────────────────────────────────────────
    app-dev:
        build:
            context: .
            dockerfile: Dockerfile.dev
        pull_policy: build
        volumes:
            - .:/app                  # исходники монтируются — hot reload работает
            - /app/node_modules       # node_modules из образа, не с хоста
            - /app/prisma/generated   # сгенерированный Prisma Client тоже из образа
        ports:
            - '3000:3000'
        env_file: .env
        environment:
            - NODE_ENV=development
            - NUXT_HOST=0.0.0.0
            - CHOKIDAR_USEPOLLING=true
            # Внутри Docker localhost = сам контейнер, поэтому используем имя сервиса db
            - DATABASE_URL=postgres://user:password@db:5432/mydb
        depends_on:
            db:
                condition: service_healthy
        profiles: [dev]
        restart: unless-stopped

    # ── Prod: оптимизированная сборка ─────────────────────────────────────────
    app-prod:
        build:
            context: .
            dockerfile: Dockerfile
        pull_policy: build
        ports:
            - '3000:3000'
        env_file: .env
        environment:
            - NODE_ENV=production
            - NUXT_HOST=0.0.0.0
            - DATABASE_URL=postgres://user:password@db:5432/mydb
        depends_on:
            db:
                condition: service_healthy
        profiles: [prod]
        restart: unless-stopped

volumes:
    pgdata:
